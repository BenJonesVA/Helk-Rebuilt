# Makes GraphFrames and the Elasticsearch-Spark connector available to every
# notebook-created SparkSession without each notebook needing its own
# spark.jars / --packages config - see MODERNIZATION.md Phase 3 for the
# GraphFrames two-jar (core + graphx) requirement and graphframes.io citation,
# and for the elasticsearch-spark-30_2.13 Spark-4-compatibility caveat.
spark.jars /usr/local/spark/jars/graphframes-spark4_2.13-0.12.1.jar,/usr/local/spark/jars/graphframes-graphx-spark4_2.13-0.12.1.jar,/usr/local/spark/jars/elasticsearch-spark-30_2.13-9.0.3.jar
