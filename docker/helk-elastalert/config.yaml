# HELK script: HELK ElastAlert2 config
# HELK build Stage: Alpha
# Author: Roberto Rodriguez (@Cyb3rWard0g)
# License: GPL-3.0

# References:
# https://elastalert2.readthedocs.io/en/latest/configuration.html

# rules/curated holds the HELK-maintained rules baked into the image;
# rules/sigma is a mounted volume populated by the helk-sigma-convert
# one-shot container. scan_subdirectories defaults to true so both are picked
# up under this single rules_folder.
rules_folder: rules
run_every:
    seconds: 60
buffer_time:
    seconds: 900

# Elasticsearch connection (host/port/username/password/TLS) is supplied via
# the ES_HOST / ES_PORT / ES_USERNAME / ES_PASSWORD / ES_USE_SSL environment
# variables set in compose - elastalert2 maps these to their config.yaml
# equivalents automatically, so none of them are hardcoded here.

alert_time_limit:
    days: 1
writeback_index: elastalert_status
alert_text: "Index: {0} \nEvent_Timestamp: {1} \nBeat_Name: {2} \nUser_Name: {3} \nHost_Name: {4} \nLog_Name: {5} \nOriginal_Message: \n\n{6}"
alert_text_type: alert_text_only
alert_text_args: ["_index","@timestamp","beat_name","user_name","host_name","log_name","event_original_message"]
