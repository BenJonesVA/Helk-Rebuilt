# HELK Kibana configuration
#
# Connection to Elasticsearch (hosts, username, password) is supplied via the
# ELASTICSEARCH_HOSTS / ELASTICSEARCH_USERNAME / ELASTICSEARCH_PASSWORD
# environment variables set in compose — the Kibana Docker image maps these
# to their kibana.yml equivalents automatically.

server.name: "helk-kibana"
server.host: "0.0.0.0"

# The maximum payload size in bytes for incoming server requests.
server.maxPayloadBytes: 2048576

elasticsearch.pingTimeout: 7500
elasticsearch.requestTimeout: 300000

# When running Kibana in a Docker container, all container processes are run within a user
# namespace with seccomp-bpf and AppArmor profiles that prevent the Chromium sandbox from being
# used. In these situations, disabling the sandbox is recommended, as the container implements
# similar security mechanisms.
xpack.reporting.capture.browser.chromium.disableSandbox: true

# Encryption keys (xpack.encryptedSavedObjects/reporting/security.encryptionKey) are supplied
# via KIBANA_ENCRYPTEDSAVEDOBJECTS_KEY / KIBANA_REPORTING_KEY / KIBANA_SECURITY_KEY in
# docker/.env — never commit real values here.
