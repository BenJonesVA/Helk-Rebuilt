name: helk

# Single consolidated compose file for the core stack (replaces the old four
# near-duplicate helk-kibana-*.yml "build option" files). Compose `profiles`
# make optional components opt-in: `alert` (Phase 2 — ElastAlert2 + Sigma-
# derived detections) and `notebook` (Phase 3 — Spark standalone cluster +
# Jupyter/GraphFrames) are both wired up below, each via
# `docker compose --profile <name> up -d --build`.

services:
  helk-elasticsearch:
    build: ./helk-elasticsearch
    image: helk-elasticsearch:${STACK_VERSION}
    container_name: helk-elasticsearch
    logging:
      driver: "json-file"
      options:
        max-file: "9"
        max-size: "6m"
    volumes:
      - esdata:/usr/share/elasticsearch/data
      - ./helk-elasticsearch/config/elasticsearch.yml:/usr/share/elasticsearch/config/elasticsearch.yml
      - ./helk-elasticsearch/scripts:/usr/share/elasticsearch/scripts
    entrypoint: /usr/share/elasticsearch/scripts/elasticsearch-entrypoint.sh
    environment:
      - cluster.name=${CLUSTER_NAME}
      - node.name=helk-1
      - discovery.type=single-node
      - xpack.license.self_generated.type=${LICENSE}
      - xpack.security.enabled=true
      - xpack.security.http.ssl.enabled=false
      - xpack.security.transport.ssl.enabled=false
      - ELASTIC_PASSWORD=${ELASTIC_PASSWORD}
      - HELK_ES_MEMORY=${HELK_ES_MEMORY}
    mem_limit: ${MEM_LIMIT}
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nproc: 20480
      nofile:
        soft: 160000
        hard: 160000
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:9200 | grep -q 'missing authentication credentials'"]
      interval: 10s
      timeout: 10s
      retries: 60
    restart: always
    networks:
      helk:

  helk-elasticsearch-setup:
    image: docker.elastic.co/elasticsearch/elasticsearch:${STACK_VERSION}
    container_name: helk-elasticsearch-setup
    depends_on:
      helk-elasticsearch:
        condition: service_healthy
    command: >
      bash -c '
        if [ x${ELASTIC_PASSWORD} == x ]; then
          echo "Set the ELASTIC_PASSWORD environment variable in docker/.env";
          exit 1;
        elif [ x${KIBANA_PASSWORD} == x ]; then
          echo "Set the KIBANA_PASSWORD environment variable in docker/.env";
          exit 1;
        fi;
        echo "Setting kibana_system password";
        until curl -s -X POST -u "elastic:${ELASTIC_PASSWORD}" -H "Content-Type: application/json" http://helk-elasticsearch:9200/_security/user/kibana_system/_password -d "{\"password\":\"${KIBANA_PASSWORD}\"}" | grep -q "^{}"; do sleep 5; done;
        echo "Setting logstash_system password";
        until curl -s -X POST -u "elastic:${ELASTIC_PASSWORD}" -H "Content-Type: application/json" http://helk-elasticsearch:9200/_security/user/logstash_system/_password -d "{\"password\":\"${LOGSTASH_SYSTEM_PASSWORD}\"}" | grep -q "^{}"; do sleep 5; done;
        echo "All done!";
      '
    networks:
      helk:

  helk-kibana:
    build: ./helk-kibana
    image: helk-kibana:${STACK_VERSION}
    container_name: helk-kibana
    logging:
      driver: "json-file"
      options:
        max-file: "9"
        max-size: "6m"
    volumes:
      - ./helk-kibana/config/kibana.yml:/usr/share/kibana/config/kibana.yml
      - ./helk-kibana/objects:/usr/share/kibana/objects
      - ./helk-kibana/scripts:/usr/share/kibana/scripts
      - ./helk-kibana/custom:/usr/share/kibana/custom
    environment:
      - SERVERNAME=helk-kibana
      - ELASTICSEARCH_HOSTS=http://helk-elasticsearch:9200
      - ELASTICSEARCH_USERNAME=kibana_system
      - ELASTICSEARCH_PASSWORD=${KIBANA_PASSWORD}
      - XPACK_ENCRYPTEDSAVEDOBJECTS_ENCRYPTIONKEY=${KIBANA_ENCRYPTEDSAVEDOBJECTS_KEY}
      - XPACK_REPORTING_ENCRYPTIONKEY=${KIBANA_REPORTING_KEY}
      - XPACK_SECURITY_ENCRYPTIONKEY=${KIBANA_SECURITY_KEY}
    ports:
      - "${KIBANA_PORT}:5601"
    healthcheck:
      test: ["CMD-SHELL", "curl -s -I http://localhost:5601 | grep -q 'HTTP/1.1 302 Found'"]
      interval: 10s
      timeout: 10s
      retries: 60
    restart: always
    depends_on:
      helk-elasticsearch:
        condition: service_healthy
      helk-elasticsearch-setup:
        condition: service_completed_successfully
    networks:
      helk:

  helk-logstash:
    build: ./helk-logstash
    image: helk-logstash:${STACK_VERSION}
    container_name: helk-logstash
    logging:
      driver: "json-file"
      options:
        max-file: "9"
        max-size: "6m"
    volumes:
      - ./helk-logstash/pipeline:/usr/share/logstash/pipeline
      - ./helk-logstash/mordor_pipeline:/usr/share/logstash/mordor_pipeline
      - ./helk-logstash/output_templates:/usr/share/logstash/output_templates
      - ./helk-logstash/enrichments/cti:/usr/share/logstash/cti
      - ./helk-logstash/scripts:/usr/share/logstash/scripts
    entrypoint: /usr/share/logstash/scripts/logstash-entrypoint.sh
    environment:
      - xpack.monitoring.enabled=true
      - xpack.monitoring.elasticsearch.hosts=http://helk-elasticsearch:9200
      - xpack.monitoring.elasticsearch.username=logstash_system
      - xpack.monitoring.elasticsearch.password=${LOGSTASH_SYSTEM_PASSWORD}
      - log.level=warn
      - ELASTIC_PASSWORD=${ELASTIC_PASSWORD}
    ports:
      - "5044:5044"
      - "8531:8531"
      - "3515:3515"
      - "5514:5514"
      - "8515:8515"
      - "8516:8516"
      - "5514:5514/udp"
      - "8515:8515/udp"
      - "8516:8516/udp"
    restart: always
    depends_on:
      helk-elasticsearch:
        condition: service_healthy
      helk-elasticsearch-setup:
        condition: service_completed_successfully
      helk-kafka-topics-setup:
        condition: service_completed_successfully
    networks:
      helk:

  helk-kafka-broker:
    build: ./helk-kafka-broker
    image: helk-kafka-broker:4.3.1
    container_name: helk-kafka-broker
    logging:
      driver: "json-file"
      options:
        max-file: "5"
        max-size: "1m"
    volumes:
      - kafkadata:/var/lib/kafka/data
    environment:
      CLUSTER_ID: ${KAFKA_CLUSTER_ID}
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: CONTROLLER://:29093,PLAINTEXT://:9092,EXTERNAL://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://helk-kafka-broker:9092,EXTERNAL://${ADVERTISED_LISTENER}:9093
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@helk-kafka-broker:29093
      KAFKA_LOG_DIRS: /var/lib/kafka/data
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 2000
      KAFKA_NUM_PARTITIONS: 2
      KAFKA_LOG_RETENTION_HOURS: 4
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
      KAFKA_UNCLEAN_LEADER_ELECTION_ENABLE: "true"
      KAFKA_NUM_REPLICA_FETCHERS: 2
      KAFKA_HEAP_OPTS: -Xmx1G -Xms256M
    ports:
      - "9093:9093"
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092 >/dev/null 2>&1"]
      interval: 10s
      timeout: 10s
      retries: 30
    restart: always
    networks:
      helk:

  helk-kafka-topics-setup:
    build: ./helk-kafka-broker
    image: helk-kafka-broker:4.3.1
    container_name: helk-kafka-topics-setup
    depends_on:
      helk-kafka-broker:
        condition: service_healthy
    entrypoint: /opt/helk/kafka/scripts/kafka-create-topics.sh
    volumes:
      - ./helk-kafka-broker/scripts:/opt/helk/kafka/scripts
    environment:
      KAFKA_BOOTSTRAP_SERVER: helk-kafka-broker:9092
      REPLICATION_FACTOR: 1
      KAFKA_CREATE_TOPICS: "winlogbeat, winevent, SYSMON_JOIN, filebeat, zeek"
    networks:
      helk:

  helk-sigma-convert:
    build:
      context: ./helk-sigma-convert
      args:
        SIGMA_RULES_REF: ${SIGMA_RULES_REF}
    image: helk-sigma-convert:${SIGMA_RULES_REF}
    container_name: helk-sigma-convert
    profiles: ["alert"]
    volumes:
      - elastalert-sigma-rules:/output
    environment:
      - SIGMA_OUTPUT_DIR=/output
    networks:
      helk:

  helk-elastalert:
    build: ./helk-elastalert
    image: helk-elastalert:2.30.0
    container_name: helk-elastalert
    profiles: ["alert"]
    logging:
      driver: "json-file"
      options:
        max-file: "9"
        max-size: "6m"
    volumes:
      - elastalert-sigma-rules:/etc/elastalert/rules/sigma
    environment:
      - ES_HOST=helk-elasticsearch
      - ES_PORT=9200
      - ES_USERNAME=elastic
      - ES_PASSWORD=${ELASTIC_PASSWORD}
      - ES_USE_SSL=false
      - SLACK_WEBHOOK_URL=${SLACK_WEBHOOK_URL}
    restart: always
    depends_on:
      helk-elasticsearch:
        condition: service_healthy
      helk-elasticsearch-setup:
        condition: service_completed_successfully
      helk-sigma-convert:
        condition: service_completed_successfully
    networks:
      helk:

  helk-spark-master:
    build: ./helk-spark-master
    image: helk-spark-master:4.1.2
    container_name: helk-spark-master
    profiles: ["notebook"]
    logging:
      driver: "json-file"
      options:
        max-file: "9"
        max-size: "6m"
    ports:
      - "8080:8080"
      - "7077:7077"
    restart: always
    networks:
      helk:

  helk-spark-worker:
    build: ./helk-spark-worker
    image: helk-spark-worker:4.1.2
    container_name: helk-spark-worker
    profiles: ["notebook"]
    logging:
      driver: "json-file"
      options:
        max-file: "9"
        max-size: "6m"
    environment:
      - SPARK_MASTER=spark://helk-spark-master:7077
      - SPARK_WORKER_MEMORY=${SPARK_WORKER_MEMORY}
    ports:
      - "8081:8081"
    restart: always
    depends_on:
      helk-spark-master:
        condition: service_started
    networks:
      helk:

  helk-jupyter:
    build: ./helk-jupyter
    image: helk-jupyter:4.1.2
    container_name: helk-jupyter
    profiles: ["notebook"]
    logging:
      driver: "json-file"
      options:
        max-file: "9"
        max-size: "6m"
    volumes:
      - jupyter-hive-metastore:/home/jovyan/srv/pgsql
    environment:
      - JUPYTER_TOKEN=${JUPYTER_TOKEN}
      - HIVE_METASTORE_PASSWORD=${HIVE_METASTORE_PASSWORD}
      - ELASTIC_PASSWORD=${ELASTIC_PASSWORD}
    restart: always
    depends_on:
      helk-elasticsearch:
        condition: service_healthy
      helk-elasticsearch-setup:
        condition: service_completed_successfully
      helk-spark-master:
        condition: service_started
      helk-spark-worker:
        condition: service_started
    networks:
      helk:

  helk-nginx:
    build: ./helk-nginx
    image: helk-nginx:1.30-alpine
    container_name: helk-nginx
    logging:
      driver: "json-file"
      options:
        max-file: "9"
        max-size: "6m"
    volumes:
      - ./helk-nginx/config/core.conf:/etc/nginx/conf.d/default.conf
      - nginx-certs:/etc/ssl/certs
      - nginx-private:/etc/ssl/private
    ports:
      - "80:80"
      - "443:443"
    restart: always
    depends_on:
      helk-kibana:
        condition: service_healthy
    networks:
      helk:

networks:
  helk:
    driver: bridge

volumes:
  esdata:
    driver: local
  kafkadata:
    driver: local
  nginx-certs:
    driver: local
  nginx-private:
    driver: local
  elastalert-sigma-rules:
    driver: local
  jupyter-hive-metastore:
    driver: local
